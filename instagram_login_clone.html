<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Login Mockup</title>
  <style>
    :root {
      --ig-font: "Instagram Sans", "Instagram Sans Script", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --left-bg: #090d11;
      --right-bg: #1f1f23;
      --divider: #353a42;
      --text-color: #f5f7fb;
      --muted-text: #a5b4c3;
      --input-border: #565b65;
      --button-blue: #184b84;
      --link-blue: #2b9fff;
      --logo-top: 62px;
      --logo-left: 67px;
      --logo-scale: 1;
      --meta-width: 78px;
      --headline-size: 53px;
      --panel-width: 682px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--ig-font);
      color: var(--text-color);
      background: var(--left-bg);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    button,
    input,
    a {
      font: inherit;
    }

    .page {
      min-height: calc(100vh - 48px);
      display: grid;
      grid-template-columns: minmax(560px, 57%) 1fr;
      border-bottom: 1px solid #343941;
    }

    .left {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 62px 54px 78px;
      background: var(--left-bg);
      overflow: hidden;
    }

    .right {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 54px 62px;
      background: var(--right-bg);
      border-left: 3px solid var(--divider);
    }

    .instagram-logo-wrap {
      position: absolute;
      top: var(--logo-top);
      left: var(--logo-left);
      display: flex;
      align-items: center;
      justify-content: center;
      transform: scale(var(--logo-scale));
      transform-origin: top left;
    }

    .instagram-logo {
      width: 95px;
      height: 95px;
      background-image: url("https://static.cdninstagram.com/rsrc.php/yO/r/Ny6hrBVLYjl.webp");
      background-position: 0 0;
      background-size: auto;
      background-repeat: no-repeat;
      display: inline-block;
    }

    .headline {
      margin: 6px 0 44px;
      font-size: clamp(36px, 3.1vw, var(--headline-size));
      line-height: 1.55;
      font-weight: 400;
      text-align: center;
      letter-spacing: 0;
    }

    .headline .accent {
      display: block;
      font-weight: 500;
      background: linear-gradient(90deg, #ff5c1c 32%, #ff148e 54%, #a135ff 76%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .story-stack {
      position: relative;
      width: 430px;
      height: 330px;
      transform: translateX(6px);
    }

    .story-stack-image {
      display: block;
      width: 430px;
      max-width: 100%;
      height: auto;
      object-fit: contain;
    }

    .story-card {
      position: absolute;
      width: 202px;
      height: 250px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 16px 42px rgba(0, 0, 0, 0.42);
      background: #222;
    }

    .story-card::before,
    .story-card::after {
      content: "";
      position: absolute;
      pointer-events: none;
    }

    .story-card::before {
      left: 14px;
      right: 14px;
      top: 18px;
      height: 3px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
    }

    .story-card::after {
      right: 13px;
      bottom: 18px;
      width: 20px;
      height: 20px;
      transform: rotate(-45deg);
      border: 3px solid #fff;
      border-top: 0;
      border-right: 0;
      border-radius: 0 0 0 8px;
    }

    .card-left {
      left: 54px;
      top: 75px;
      transform: rotate(-5deg);
      background:
        linear-gradient(120deg, transparent 0 42%, #42c875 43% 55%, transparent 56%),
        radial-gradient(circle at 49% 20%, #f5c7a6 0 17px, transparent 18px),
        linear-gradient(90deg, #593729 0 29%, #dbc2a9 30% 42%, #f8b322 43% 56%, #175854 57% 100%);
    }

    .card-main {
      left: 140px;
      top: 15px;
      width: 200px;
      height: 322px;
      z-index: 3;
      transform: rotate(0.5deg);
      background:
        radial-gradient(circle at 51% 34%, #ffd3a3 0 30px, transparent 31px),
        radial-gradient(circle at 35% 31%, #f2bc81 0 36px, transparent 37px),
        radial-gradient(circle at 69% 37%, #533828 0 41px, transparent 42px),
        linear-gradient(120deg, rgba(255,255,255,.24) 0 33%, transparent 34%),
        linear-gradient(155deg, #b98b56 0 24%, #f0c369 25% 50%, #8b5c32 51% 100%);
    }

    .card-main .comment {
      position: absolute;
      left: 15px;
      bottom: 17px;
      width: 134px;
      height: 26px;
      border: 3px solid #fff;
      border-radius: 999px;
    }

    .card-right {
      right: 38px;
      top: 68px;
      z-index: 2;
      transform: rotate(6deg);
      background:
        radial-gradient(circle at 70% 19%, #43a35d 0 36px, transparent 37px),
        radial-gradient(circle at 58% 55%, #ffd3a5 0 42px, transparent 43px),
        linear-gradient(150deg, #96d9ff 0 35%, #67d155 36% 56%, #174c2b 57% 100%);
    }

    .reaction {
      position: absolute;
      z-index: 6;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.28);
    }

    .emoji-pill {
      left: 92px;
      top: 41px;
      gap: 3px;
      width: 86px;
      height: 37px;
      padding: 4px 7px;
      border-radius: 20px;
      background: #fff;
      transform: rotate(-9deg);
    }

    .emoji {
      display: grid;
      place-items: center;
      width: 23px;
      height: 23px;
      color: #1a1d23;
      font-size: 14px;
      border-radius: 50%;
      background: #f7f2dc;
    }

    .heart {
      left: 25px;
      top: 202px;
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #ff4b1e 5%, #ff006f 55%, #c100ff 100%);
      border-radius: 50% 50% 45% 45%;
      transform: rotate(-38deg);
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      background: inherit;
      border-radius: 50%;
    }

    .heart::before {
      width: 31px;
      height: 31px;
      left: -2px;
      top: -10px;
    }

    .heart::after {
      width: 31px;
      height: 31px;
      right: -10px;
      top: 2px;
    }

    .favorite {
      right: 8px;
      top: 110px;
      width: 53px;
      height: 31px;
      border-radius: 18px;
      background: #20d35d;
      color: #fff;
      font-size: 17px;
      font-weight: 700;
    }

    .avatar {
      right: 6px;
      bottom: 88px;
      width: 66px;
      height: 66px;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, #ff8a00, #ff0089, #763aff);
    }

    .avatar span {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 3px solid #111;
      background:
        radial-gradient(circle at 50% 28%, #f6d7ac 0 15px, transparent 16px),
        linear-gradient(140deg, #d8f86d 0 38%, #87a93c 39% 100%);
    }

    .login-panel {
      width: min(100%, var(--panel-width));
      transform: translateY(-11px);
    }

    .login-panel h1 {
      margin: 0 0 30px;
      font-size: 20px;
      line-height: calc(var(--headline3-line-height, 1.25) * 1em);
      font-weight: 760;
      color: #fff;
    }

    .field {
      width: 100%;
      height: 73px;
      margin-bottom: 18px;
      padding: 0 19px;
      border: 1px solid var(--input-border);
      border-radius: 17px;
      background: transparent;
      color: #fff;
      font-size: 19px;
      font-weight: 650;
      outline: none;
    }

    .field::placeholder {
      color: var(--muted-text);
      opacity: 1;
    }

    .login-button,
    .secondary-button {
      width: 100%;
      height: 55px;
      border-radius: 28px;
      font-size: 19px;
      font-weight: 760;
      cursor: default;
    }

    .login-button {
      margin-top: 13px;
      border: 0;
      background: var(--button-blue);
      color: rgba(255, 255, 255, 0.42);
    }

    .forgot {
      display: block;
      margin: 30px 0 81px;
      text-align: center;
      color: #fff;
      font-size: 16px;
      line-height: calc(var(--headline3-line-height, 1.25) * 1em);
      font-weight: 760;
      text-decoration: none;
    }

    .ig-text-style {
      --x---base-line-clamp-line-height: calc(var(--headline3-line-height, 1.25) * 1em);
      --x-lineHeight: calc(var(--headline3-line-height, 1.25) * 1em);
      color: #f5f5f5;
      direction: ltr;
      display: inline;
      font-family: var(--ig-font);
      font-weight: 760;
      letter-spacing: 0;
      overflow-wrap: break-word;
      text-align: inherit;
      white-space: pre-line;
    }

    .secondary-button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 15px;
      background: transparent;
      border: 1px solid var(--input-border);
      color: #fff;
      text-decoration: none;
      border-radius: 28px;
      line-height: 1;
    }

    .secondary-button.create {
      color: #2b9fff;
      border-color: var(--link-blue);
      border-radius: 28px;
    }

    .facebook-icon {
      width: 16px;
      height: 16px;
      flex: 0 0 16px;
      fill: var(--link-blue);
    }

    .meta {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 30px;
    }

    .meta-logo {
      display: block;
      width: var(--meta-width);
      height: auto;
    }

    footer {
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 25px;
      padding: 12px 20px 0;
      background: #090d11;
      color: #c6cfda;
      font-size: 14px;
      font-family: var(--ig-font);
      white-space: nowrap;
      overflow: hidden;
    }

    footer a {
      color: inherit;
      text-decoration: none;
    }

    @media (max-width: 980px) {
      .page {
        grid-template-columns: 1fr;
      }

      .left {
        min-height: 520px;
        padding-top: 128px;
      }

      .right {
        border-left: 0;
        border-top: 2px solid #353a42;
      }

      .login-panel {
        transform: none;
      }
    }

    @media (max-width: 620px) {
      .page {
        min-height: auto;
      }

      .left {
        min-height: 470px;
        padding: 112px 18px 36px;
      }

      .instagram-logo-wrap {
        top: 30px;
        left: 28px;
      }

      .instagram-logo {
        --logo-scale: 0.75;
      }

      .headline {
        font-size: 33px;
        line-height: 1.28;
        margin-bottom: 28px;
      }

      .story-stack {
        width: 335px;
        height: 278px;
        transform: scale(0.78);
        transform-origin: top center;
      }

      .story-stack-image {
        width: 335px;
      }

      .right {
        padding: 42px 22px;
      }

      .field {
        height: 61px;
        font-size: 16px;
      }

      .login-button,
      .secondary-button {
        height: 52px;
        font-size: 16px;
      }

      .forgot {
        margin-bottom: 58px;
        font-size: 16px;
      }

      footer {
        flex-wrap: wrap;
        gap: 12px 18px;
        white-space: normal;
        padding-bottom: 14px;
      }
    }

    @media (max-width: 980px) {
      body {
        min-width: 1180px;
      }

      .page {
        min-height: calc(100vh - 48px);
        grid-template-columns: minmax(560px, 57%) 1fr;
      }

      .left {
        min-height: auto;
        padding: 62px 54px 78px;
      }

      .right {
        border-left: 3px solid var(--divider);
        border-top: 0;
        padding: 54px 62px;
      }

      .login-panel {
        transform: translateY(-11px);
      }

      .instagram-logo-wrap {
        top: var(--logo-top);
        left: var(--logo-left);
      }

      .instagram-logo {
        --logo-scale: 1;
      }

      .headline {
        font-size: clamp(36px, 3.1vw, var(--headline-size));
        line-height: 1.55;
        margin: 6px 0 44px;
      }

      .story-stack {
        width: 430px;
        height: 330px;
        transform: translateX(6px);
      }

      .story-stack-image {
        width: 430px;
      }

      .field {
        height: 73px;
        font-size: 19px;
      }

      .login-button,
      .secondary-button {
        height: 55px;
        font-size: 19px;
      }

      .forgot {
        margin-bottom: 81px;
        font-size: 16px;
      }

      footer {
        flex-wrap: nowrap;
        gap: 25px;
        white-space: nowrap;
        padding-bottom: 0;
      }
    }
  </style>
</head>
